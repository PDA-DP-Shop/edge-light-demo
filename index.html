<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S26 Privacy Lock</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

.content{
    text-align:center;
    z-index:2;
    position:relative;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    transition:0.1s linear;
}
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#00f0ff;
}
</style>
</head>

<body>

<div class="content">
    <h2 id="secret">Top Secret Message</h2>
    <p>Only visible from straight front.</p>
    <button onclick="activatePrivacy()">Activate Privacy</button>
</div>

<div class="overlay" id="privacyOverlay"></div>

<script>
let baseGamma = null;
let active = false;

function activatePrivacy(){

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(response => {
            if (response === 'granted') {
                startPrivacy();
            }
        });
    } else {
        startPrivacy();
    }
}

function startPrivacy(){
    active = true;

    window.addEventListener("deviceorientation", function(event){

        if(!active) return;

        if(baseGamma === null){
            baseGamma = event.gamma;
        }

        let difference = Math.abs(event.gamma - baseGamma);

        // Strong privacy effect
        let darkness = Math.min(difference * 8, 100);

        document.getElementById("privacyOverlay").style.background =
            "linear-gradient(to right, rgba(0,0,0," + darkness/100 + ") 0%, transparent 40%, transparent 60%, rgba(0,0,0," + darkness/100 + ") 100%)";

    });
}
</script>

</body>
</html>
