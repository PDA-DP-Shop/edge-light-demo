<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S26 Privacy Simulation</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

.content{
    text-align:center;
    z-index:2;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    transition:0.1s linear;
}
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#00f0ff;
}
</style>
</head>

<body>

<div class="content">
    <h2>Confidential Content</h2>
    <p>Tilt phone after activating privacy mode.</p>
    <button onclick="activatePrivacy()">Activate Privacy Mode</button>
</div>

<div class="overlay" id="privacyOverlay"></div>

<script>
let baseGamma = null;
let privacyActive = false;

function activatePrivacy(){

    // iOS permission required
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(response => {
            if (response === 'granted') {
                startTracking();
            }
        }).catch(console.error);
    } else {
        startTracking();
    }
}

function startTracking(){
    privacyActive = true;

    window.addEventListener("deviceorientation", function(event){

        if(!privacyActive) return;

        if(baseGamma === null){
            baseGamma = event.gamma; // Save current straight position
        }

        let difference = Math.abs(event.gamma - baseGamma);

        let darkness = Math.min(difference * 5, 85);

        document.getElementById("privacyOverlay").style.background =
            "linear-gradient(to right, rgba(0,0,0," + darkness/100 + "), transparent, rgba(0,0,0," + darkness/100 + "))";
    });
}
</script>

</body>
</html>
