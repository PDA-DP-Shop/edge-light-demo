<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Display Simulation</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

.content{
    text-align:center;
    z-index:2;
    position:relative;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    transition:0.2s;
}
button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#00f0ff;
}
</style>
</head>

<body>

<div class="content">
    <h2>Confidential Message</h2>
    <p>This should look private from side angles.</p>
    <button onclick="enableSensor()">Enable Privacy Sensor</button>
</div>

<div class="overlay" id="privacyOverlay"></div>

<script>
function enableSensor(){
    if (typeof DeviceOrientationEvent !== "undefined") {
        window.addEventListener("deviceorientation", function(event){
            let tilt = Math.abs(event.gamma);

            let darkness = Math.min(tilt * 3, 80);

            document.getElementById("privacyOverlay").style.background =
                "linear-gradient(to right, rgba(0,0,0," + darkness/100 + "), transparent, rgba(0,0,0," + darkness/100 + "))";
        });
    } else {
        alert("Device motion not supported");
    }
}
</script>

</body>
</html>
