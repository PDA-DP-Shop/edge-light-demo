<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Display Demo</title>

<style>
body{
    margin:0;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    overflow:hidden;
}

/* Main Content */
.content{
    width:90%;
    max-width:400px;
    padding:30px;
    background:#111;
    color:white;
    border-radius:20px;
    text-align:center;
    position:relative;
    z-index:2;
}

/* Privacy Overlay */
.privacy-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(
        to right,
        rgba(0,0,0,0.9),
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.9)
    );
    backdrop-filter:blur(10px);
    opacity:0;
    pointer-events:none;
    transition:0.4s;
}

/* Active Privacy Mode */
.privacy-overlay.active{
    opacity:1;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#00f0ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="content">
    <h2>Private Message</h2>
    <p>This content is visible only from front.</p>
    <button onclick="togglePrivacy()">Toggle Privacy Mode</button>
</div>

<div class="privacy-overlay" id="privacy"></div>

<script>
function togglePrivacy(){
    document.getElementById("privacy").classList.toggle("active");
}
</script>

</body>
</html>
