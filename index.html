<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Lighting Demo</title>

<style>
body{
    margin:0;
    background:#111;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* Fake Phone Screen */
.screen{
    width:320px;
    height:600px;
    background:#000;
    border-radius:40px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* Edge Light */
.edge-light{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:40px;
    pointer-events:none;
    box-shadow:0 0 20px 5px #00f0ff;
    opacity:0;
}

/* Animation */
@keyframes glow {
    0% { opacity:0; }
    20% { opacity:1; }
    80% { opacity:1; }
    100% { opacity:0; }
}

.edge-light.active{
    animation:glow 2s ease-in-out;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#00f0ff;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="screen">
    <h3>New Message</h3>
    <div class="edge-light" id="light"></div>
</div>

<br>

<button onclick="showNotification()">Show Message</button>

<script>
function showNotification(){
    const light = document.getElementById("light");
    light.classList.add("active");

    setTimeout(()=>{
        light.classList.remove("active");
    },2000);
}
</script>

</body>
</html>
